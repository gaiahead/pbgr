name: Update PBGR Data

on:
  schedule:
    # 매일 UTC 22:00 (KST 07:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance scipy playwright
          playwright install chromium --with-deps

      - name: Generate PBGR data
        run: python gen_pbgr_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pbgr_data.json
          git diff --staged --quiet || git commit -m "chore: update pbgr_data.json [$(date +'%Y-%m-%d %H:%M KST')]"
          git push
