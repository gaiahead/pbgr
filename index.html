<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBGR 가치평가 모니터</title>
  <link rel="stylesheet" href="style.css?v=large-capital-units-20260531"/>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 PBGR 가치평가 모니터</h1>
    <p>Price to Book Growth Ratio · <span id="updated"></span> 기준</p>
  </div>
  <div class="header-right">
    <span class="status-msg" id="status-msg"></span>
    <button class="save-btn saved" id="save-btn" onclick="saveSettings()">✓ 저장됨</button>
  </div>
</header>

<div class="section">
  <div class="section-title">
    <span class="param">
      <span class="param-label">요구수익률</span>
      <span class="param-input-box">
        <input class="req-input" id="req-kr" type="number" step="0.1" value="10" oninput="markDirty()">
        <span class="unit">%</span>
      </span>
      <span class="discount-box">
        <span class="discount-label">10년 할인계수</span>
        <span class="discount-hint" id="req-kr-discount">1 / 1.10^10 = 0.386배</span>
      </span>
    </span>
  </div>
  <div class="table-wrap">
    <table>
      <colgroup>
        <col class="col-name">
        <col class="col-marketcap">
        <col class="col-fairmarketcap">
        <col class="col-pbgr">
        <col class="col-gap">
        <col class="col-price">
        <col class="col-fair">
        <col class="col-equity">
        <col class="col-equity">
        <col class="col-equity">
        <col class="col-cagr">
        <col class="col-cagr">
        <col class="col-assumption">
        <col class="col-shares">
      </colgroup>
      <thead>
        <tr class="group-row">
          <th rowspan="2">종목</th>
          <th rowspan="2">시가총액</th>
          <th rowspan="2">적정 시가총액</th>
          <th rowspan="2">PBGR</th>
          <th rowspan="2">괴리율</th>
          <th rowspan="2">종가</th>
          <th rowspan="2">적정가</th>
          <th class="group-head" colspan="3">자본총계</th>
          <th class="group-head" colspan="3">자본 CAGR</th>
          <th rowspan="2">주식수</th>
        </tr>
        <tr class="sub-row">
          <th>최근</th>
          <th>현재</th>
          <th>+10년</th>
          <th>5년 실적</th>
          <th>3년 기대</th>
          <th>가정 ✎</th>
        </tr>
      </thead>
      <tbody id="kr-body"></tbody>
    </table>
  </div>
</div>

<div class="note">
  자본 CAGR (가정) · 요구수익률 수정 후 <strong style="color:#2563eb">저장</strong> 클릭 → 브라우저에 영구 저장 &nbsp;|&nbsp;
  자본 CAGR (가정) 더블클릭 = 기본값 복원 &nbsp;|&nbsp; PBGR &lt; 1 = 저평가
</div>

<script src="app.js?v=large-capital-units-20260531"></script>
</body>
</html>
