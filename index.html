<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBGR 가치평가 모니터</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 PBGR 가치평가 모니터</h1>
    <p>Price to Book Growth Ratio · 한국 주식 · <span id="updated"></span> 기준</p>
  </div>
  <div class="header-right">
    <span class="status-msg" id="status-msg"></span>
    <button class="save-btn saved" id="save-btn" onclick="saveSettings()">✓ 저장됨</button>
  </div>
</header>

<div class="section">
  <div class="section-title">
    🇰🇷 한국
    <span class="param">
      요구수익률
      <input class="req-input" id="req-kr" type="number" step="0.1" value="10" oninput="markDirty()">
      <span style="color:#64748b;font-size:0.78rem">%</span>
    </span>
  </div>
  <table>
    <thead><tr>
      <th>종목</th>
      <th>전일 종가</th>
      <th>적정가</th>
      <th>괴리율</th>
      <th style="color:#334155;font-weight:500">자본총계 (실적)</th>
      <th style="color:#334155;font-weight:500">자본총계 (현재)</th>
      <th style="color:#334155;font-weight:500">자본총계 (추정)</th>
      <th>PBGR</th>
      <th>ROE ✎</th>
      <th style="color:#334155;font-weight:500">ROE 참고</th>
      <th style="color:#334155;font-weight:500">주식수</th>
    </tr></thead>
    <tbody id="kr-body"></tbody>
  </table>
</div>

<div class="note">
  ROE · 요구수익률 수정 후 <strong style="color:#60a5fa">저장</strong> 클릭 → 브라우저에 영구 저장 &nbsp;|&nbsp;
  ROE 더블클릭 = 기본값 복원 &nbsp;|&nbsp; PBGR &lt; 1 = 저평가
</div>

<script src="app.js"></script>
</body>
</html>
