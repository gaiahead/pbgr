<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBGR 가치평가 모니터</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    header{padding:20px 28px 14px;border-bottom:1px solid #1e2535}
    header h1{font-size:1.2rem;font-weight:700;color:#f8fafc}
    header p{font-size:0.74rem;color:#475569;margin-top:4px}

    .section{padding:24px 28px 0}
    .section:last-of-type{padding-bottom:32px}

    .section-title{
      font-size:0.75rem;font-weight:700;color:#64748b;
      letter-spacing:.08em;text-transform:uppercase;
      margin-bottom:12px;display:flex;align-items:center;gap:10px;
    }
    .section-title .param{
      font-size:0.7rem;color:#334155;font-weight:500;
      text-transform:none;letter-spacing:0;
      background:#161b27;border:1px solid #1e2535;border-radius:5px;
      padding:2px 8px;
    }

    table{width:100%;border-collapse:collapse;font-size:0.84rem}
    thead tr{border-bottom:1px solid #1e2535}
    th{
      padding:8px 14px;text-align:right;font-size:0.68rem;font-weight:600;
      color:#475569;letter-spacing:.04em;white-space:nowrap;
    }
    th:first-child{text-align:left}
    tbody tr{border-bottom:1px solid #161b27;transition:background .12s}
    tbody tr:hover{background:#141820}
    td{padding:11px 14px;text-align:right;color:#cbd5e1;white-space:nowrap}
    td:first-child{text-align:left}

    .name{font-weight:700;color:#f1f5f9;font-size:0.88rem}
    .ticker{font-size:0.68rem;color:#475569;margin-top:2px}

    /* PBGR */
    .pbgr-val{font-weight:800;font-size:1.0rem}
    .under{color:#4ade80}
    .over {color:#f87171}

    .badge{
      display:inline-block;font-size:0.6rem;font-weight:700;
      padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle;
    }
    .badge-under{background:rgba(34,197,94,.15);color:#4ade80}
    .badge-over {background:rgba(239,68,68,.15);color:#f87171}

    /* ROE 편집 */
    .roe-cell{display:flex;align-items:center;justify-content:flex-end;gap:4px}
    .roe-input{
      background:transparent;border:none;color:#cbd5e1;
      font-size:0.84rem;font-family:inherit;
      width:52px;text-align:right;outline:none;cursor:text;
      border-bottom:1px dashed #334155;padding-bottom:1px;
      transition:border-color .15s;
    }
    .roe-input:focus{border-bottom-color:#60a5fa;color:#f1f5f9}
    .roe-unit{color:#475569;font-size:0.75rem}
    .roe-dot{
      width:6px;height:6px;border-radius:50%;flex-shrink:0;
      background:#475569;transition:background .2s;
    }
    .roe-dot.custom{background:#60a5fa}

    /* 요구수익률 편집 */
    .req-input{
      background:transparent;border:none;color:#64748b;
      font-size:0.7rem;font-family:inherit;
      width:32px;text-align:right;outline:none;cursor:text;
      border-bottom:1px dashed #334155;
    }
    .req-input:focus{border-bottom-color:#60a5fa;color:#94a3b8}

    .note{font-size:0.68rem;color:#1e2535;padding:16px 28px 24px}
  </style>
</head>
<body>

<header>
  <h1>📊 PBGR 가치평가 모니터</h1>
  <p>Price to Book Growth Ratio · <span id="updated"></span> 기준 (전일 종가)</p>
</header>

<div class="section" id="kr-section">
  <div class="section-title">
    🇰🇷 한국
    <span class="param">요구수익률 <input class="req-input" id="req-kr" value="10">%</span>
  </div>
  <table>
    <thead><tr>
      <th>종목</th>
      <th>전일 종가</th>
      <th>적정가</th>
      <th>괴리율</th>
      <th>PBGR</th>
      <th>ROE ✎</th>
      <th>기준일</th>
    </tr></thead>
    <tbody id="kr-body"></tbody>
  </table>
</div>

<div class="section" id="us-section" style="margin-top:24px">
  <div class="section-title">
    🇺🇸 미국
    <span class="param">요구수익률 <input class="req-input" id="req-us" value="7">%</span>
  </div>
  <table>
    <thead><tr>
      <th>종목</th>
      <th>전일 종가</th>
      <th>적정가</th>
      <th>괴리율</th>
      <th>PBGR</th>
      <th>ROE ✎</th>
      <th>보정</th>
      <th>기준일</th>
    </tr></thead>
    <tbody id="us-body"></tbody>
  </table>
</div>

<div class="note">
  ROE 셀 클릭 → 직접 수정 (브라우저에 저장됨, 파란 점 = 수정값) &nbsp;|&nbsp;
  PBGR &lt; 1: 저평가 &nbsp;|&nbsp; 데이터: yfinance (전일 종가 기준)
</div>

<script>
// ─── localStorage ─────────────────────────────────────────
const LS_KEY = 'pbgr_overrides';
function loadOverrides() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch { return {}; }
}
function saveOverride(ticker, field, val) {
  const ov = loadOverrides();
  if (!ov[ticker]) ov[ticker] = {};
  ov[ticker][field] = val;
  localStorage.setItem(LS_KEY, JSON.stringify(ov));
}
function clearOverride(ticker, field) {
  const ov = loadOverrides();
  if (ov[ticker]) delete ov[ticker][field];
  localStorage.setItem(LS_KEY, JSON.stringify(ov));
}

// ─── 포맷 ─────────────────────────────────────────────────
function fmtKR(v) { return v != null ? Number(v).toLocaleString('ko-KR') + '원' : '—'; }
function fmtUS(v) { return v != null ? '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'; }
function gap(pbgr) {
  if (!pbgr) return '—';
  const pct = ((1 / pbgr) - 1) * 100;
  const sign = pct >= 0 ? '+' : '';
  return `<span style="color:${pct >= 0 ? '#4ade80' : '#f87171'}">${sign}${pct.toFixed(1)}%</span>`;
}
function pbgrHtml(pbgr) {
  if (!pbgr) return '—';
  const cls = pbgr < 1 ? 'under' : 'over';
  const badge = pbgr < 1
    ? '<span class="badge badge-under">저평가</span>'
    : '<span class="badge badge-over">고평가</span>';
  return `<span class="pbgr-val ${cls}">${pbgr.toFixed(3)}${badge}</span>`;
}

// ─── PBGR 재계산 (클라이언트) ─────────────────────────────
function recalcKR(price, equity_100m, roe_pct, shares, base_date, req_return) {
  if (!price || !equity_100m || !roe_pct || !shares) return null;
  const base = new Date(base_date);
  const today = new Date();
  const months = (today.getFullYear() - base.getFullYear()) * 12 + (today.getMonth() - base.getMonth());
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const dv = months + (today.getDate() - 1) / daysInMonth;

  const roe = roe_pct / 100;
  const y10 = equity_100m * Math.pow(1 + roe, 10);
  const y11 = equity_100m * Math.pow(1 + roe, 11);
  const r_t = Math.pow(y11 / y10, 1 / 12) - 1;
  const trailing = y10 * Math.pow(1 + r_t, dv - 1);
  const bv = trailing / Math.pow(1 + req_return, 10);
  const bps = bv * 1e8 / shares;
  return bps > 0 ? { pbgr: price / bps, fair_price: Math.round(bps) } : null;
}

function recalcUS(price, equity_m, roe, ni_y1, ni_y2, shares, correction, base_date, req_return) {
  if (!price || !equity_m || !roe || !shares) return null;
  const base = new Date(base_date);
  const today = new Date();
  const months = (today.getFullYear() - base.getFullYear()) * 12 + (today.getMonth() - base.getMonth());
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const dv = months + (today.getDate() - 1) / daysInMonth;

  const y = new Array(12).fill(0);
  y[0] = equity_m;
  y[1] = y[0] + (ni_y1 || equity_m * roe);
  y[2] = y[1] + (ni_y2 || equity_m * roe);
  for (let n = 3; n <= 10; n++) y[n] = y[n-1] * (1 + roe * Math.pow(correction, n - 2));
  y[11] = y[10] * (1 + roe * Math.pow(correction, 9));
  if (y[10] <= 0) return null;
  const r_t = Math.pow(y[11] / y[10], 1 / 12) - 1;
  const trailing = y[10] * Math.pow(1 + r_t, dv - 1);
  const fair_m = trailing / Math.pow(1 + req_return, 10);
  const fair_price = fair_m * 1e6 / shares;
  return fair_price > 0 ? { pbgr: price / fair_price, fair_price } : null;
}

// ─── ROE 편집 인풋 만들기 ─────────────────────────────────
function makeRoeInput(a, isCustom, onUpdate) {
  const dot = `<span class="roe-dot${isCustom ? ' custom' : ''}" title="${isCustom ? '수정값' : '설정값'}"></span>`;
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.step = '0.01';
  inp.className = 'roe-input';
  inp.value = a._displayRoe.toFixed(2);

  inp.addEventListener('change', () => {
    const v = parseFloat(inp.value);
    if (isNaN(v) || v <= 0) return;
    saveOverride(a.ticker, 'roe_pct', v);
    onUpdate(v);
  });
  inp.addEventListener('dblclick', () => {
    clearOverride(a.ticker, 'roe_pct');
    inp.value = a.roe_pct.toFixed(2);
    onUpdate(a.roe_pct, true);
  });

  const wrap = document.createElement('div');
  wrap.className = 'roe-cell';
  wrap.innerHTML = dot;
  wrap.appendChild(inp);
  const unit = document.createElement('span');
  unit.className = 'roe-unit';
  unit.textContent = '%';
  wrap.appendChild(unit);
  return wrap;
}

// ─── 렌더 ─────────────────────────────────────────────────
let rawData = null;

function renderTables() {
  const overrides = loadOverrides();
  const reqKR = parseFloat(document.getElementById('req-kr').value) / 100 || 0.10;
  const reqUS = parseFloat(document.getElementById('req-us').value) / 100 || 0.07;

  const kr = rawData.assets.filter(a => a.market === 'KR');
  const us = rawData.assets.filter(a => a.market === 'US');

  function renderKR(tbody, assets) {
    tbody.innerHTML = '';
    assets = [...assets].map(a => {
      const ov = overrides[a.ticker] || {};
      return { ...a, _displayRoe: ov.roe_pct ?? a.roe_pct, _isCustom: !!ov.roe_pct };
    });
    assets.sort((a, b) => (a.pbgr_live || 999) - (b.pbgr_live || 999));

    assets.forEach(a => {
      const calc = recalcKR(a.price, a.equity_y0_100m, a._displayRoe, a.shares_total || a.shares, a.base_date, reqKR);
      a.pbgr_live = calc?.pbgr;
      a.fair_live = calc?.fair_price;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="name">${a.name}</div><div class="ticker">${a.ticker}</div></td>
        <td>${a.price ? a.price.toLocaleString('ko-KR') + '원' : '—'}</td>
        <td>${a.fair_live ? a.fair_live.toLocaleString('ko-KR') + '원' : '—'}</td>
        <td>${gap(a.pbgr_live)}</td>
        <td>${pbgrHtml(a.pbgr_live)}</td>
        <td></td>
        <td style="color:#475569;font-size:0.75rem">${a.base_date || '—'}</td>
      `;
      const roeTd = tr.querySelector('td:nth-child(6)');
      roeTd.appendChild(makeRoeInput(a, a._isCustom, (newRoe, reset) => {
        if (reset) clearOverride(a.ticker, 'roe_pct');
        renderTables();
      }));
      tbody.appendChild(tr);
    });
  }

  function renderUS(tbody, assets) {
    tbody.innerHTML = '';
    assets = [...assets].map(a => {
      const ov = overrides[a.ticker] || {};
      return { ...a, _displayRoe: ov.roe_pct != null ? ov.roe_pct : a.roe_pct, _isCustom: ov.roe_pct != null };
    });

    assets.forEach(a => {
      const roe = a._displayRoe / 100;
      const calc = recalcUS(a.price, a.equity_y0_m, roe, null, null, a.shares, a.correction, a.base_date, reqUS);
      a.pbgr_live = calc?.pbgr;
      a.fair_live = calc?.fair_price;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="name">${a.name}</div><div class="ticker">${a.ticker}</div></td>
        <td>${a.price ? '$' + a.price.toFixed(2) : '—'}</td>
        <td>${a.fair_live ? '$' + a.fair_live.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'}</td>
        <td>${gap(a.pbgr_live)}</td>
        <td>${pbgrHtml(a.pbgr_live)}</td>
        <td></td>
        <td style="color:#64748b;font-size:0.75rem">${a.correction ?? '—'}</td>
        <td style="color:#475569;font-size:0.75rem">${a.base_date || '—'}</td>
      `;
      const roeTd = tr.querySelector('td:nth-child(6)');
      roeTd.appendChild(makeRoeInput(a, a._isCustom, (newRoe, reset) => {
        if (reset) clearOverride(a.ticker, 'roe_pct');
        renderTables();
      }));
      tbody.appendChild(tr);
    });
  }

  renderKR(document.getElementById('kr-body'), kr);
  renderUS(document.getElementById('us-body'), us);
}

async function init() {
  const res = await fetch('pbgr_data.json');
  rawData = await res.json();

  document.getElementById('updated').textContent = rawData.updated;
  document.getElementById('req-kr').value = (rawData.kr_required_return * 100).toFixed(0);
  document.getElementById('req-us').value = (rawData.us_required_return * 100).toFixed(0);

  // shares 필드 통일
  rawData.assets.forEach(a => {
    if (!a.shares) a.shares = a.shares_total;
  });

  document.getElementById('req-kr').addEventListener('input', renderTables);
  document.getElementById('req-us').addEventListener('input', renderTables);

  renderTables();
}

init();
</script>
</body>
</html>
