<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBGR 가치평가 모니터</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    header{padding:20px 28px 14px;border-bottom:1px solid #1e2535;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .header-left h1{font-size:1.2rem;font-weight:700;color:#f8fafc}
    .header-left p{font-size:0.74rem;color:#475569;margin-top:4px}

    .header-right{display:flex;align-items:center;gap:8px}

    .save-btn{
      font-size:0.75rem;font-weight:600;padding:7px 16px;border-radius:8px;
      border:1px solid #1e3a5f;background:#1e293b;color:#60a5fa;cursor:pointer;
      transition:all .15s;white-space:nowrap;
    }
    .save-btn:hover{background:#1e3a5f;color:#93c5fd}
    .save-btn.saved{border-color:#166534;background:#14532d;color:#4ade80}
    .save-btn.unsaved{border-color:#92400e;background:#451a03;color:#fbbf24}
    .save-btn:disabled{opacity:.4;cursor:not-allowed}

    .section{padding:24px 28px 0}
    .section:last-of-type{padding-bottom:32px}

    .section-title{
      font-size:0.75rem;font-weight:700;color:#64748b;
      letter-spacing:.08em;text-transform:uppercase;
      margin-bottom:12px;display:flex;align-items:center;gap:10px;
    }
    .section-title .param{
      font-size:0.7rem;color:#94a3b8;font-weight:500;
      text-transform:none;letter-spacing:0;
      background:#161b27;border:1px solid #1e2535;border-radius:5px;
      padding:2px 10px;display:flex;align-items:center;gap:4px;
    }

    table{width:100%;border-collapse:collapse;font-size:0.84rem}
    thead tr{border-bottom:1px solid #1e2535}
    th{padding:8px 14px;text-align:right;font-size:0.68rem;font-weight:600;color:#475569;letter-spacing:.04em;white-space:nowrap}
    th:first-child{text-align:left}
    tbody tr{border-bottom:1px solid #161b27;transition:background .12s}
    tbody tr:hover{background:#141820}
    td{padding:11px 14px;text-align:right;color:#cbd5e1;white-space:nowrap}
    td:first-child{text-align:left}

    .name{font-weight:700;color:#f1f5f9;font-size:0.88rem}
    .ticker{font-size:0.68rem;color:#475569;margin-top:2px}

    .pbgr-val{font-weight:800;font-size:1.0rem}
    .under{color:#4ade80}
    .over {color:#f87171}

    .badge{display:inline-block;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
    .badge-under{background:rgba(34,197,94,.15);color:#4ade80}
    .badge-over {background:rgba(239,68,68,.15);color:#f87171}

    .edit-input{
      background:transparent;border:none;color:#cbd5e1;
      font-size:0.84rem;font-family:inherit;
      width:52px;text-align:right;outline:none;cursor:text;
      border-bottom:1px dashed #334155;padding-bottom:1px;
      transition:border-color .15s, color .15s;
    }
    .edit-input:focus{border-bottom-color:#60a5fa;color:#f1f5f9}
    .edit-input.dirty{color:#fbbf24;border-bottom-color:#92400e}
    .unit{color:#475569;font-size:0.75rem;margin-left:2px}

    .req-input{
      background:transparent;border:none;color:#94a3b8;
      font-size:0.7rem;font-family:inherit;
      width:28px;text-align:right;outline:none;cursor:text;
      border-bottom:1px dashed #334155;
    }
    .req-input:focus{border-bottom-color:#60a5fa;color:#f1f5f9}

    .status-msg{font-size:0.7rem;color:#475569;min-width:80px;text-align:right}
    .note{font-size:0.68rem;color:#334155;padding:12px 28px 24px}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 PBGR 가치평가 모니터</h1>
    <p>Price to Book Growth Ratio · 한국 주식 · <span id="updated"></span> 기준 (전일 종가)</p>
  </div>
  <div class="header-right">
    <span class="status-msg" id="status-msg"></span>
    <button class="save-btn saved" id="save-btn" onclick="saveSettings()">✓ 저장됨</button>
  </div>
</header>

<div class="section">
  <div class="section-title">
    🇰🇷 한국
    <span class="param">
      요구수익률
      <input class="req-input" id="req-kr" type="number" step="0.1" value="10" oninput="markDirty()">
      <span style="color:#64748b;font-size:0.7rem">%</span>
    </span>
  </div>
  <table>
    <thead><tr>
      <th>종목</th>
      <th>전일 종가</th>
      <th>적정가</th>
      <th>괴리율</th>
      <th>PBGR</th>
      <th>ROE ✎</th>
      <th style="color:#334155">3년 실측 ROE</th>
      <th>기준일</th>
    </tr></thead>
    <tbody id="kr-body"></tbody>
  </table>
</div>

<div class="note">
  ROE · 요구수익률 수정 후 <strong style="color:#60a5fa">저장</strong> 클릭 → 이 브라우저에 영구 저장 &nbsp;|&nbsp;
  ROE 더블클릭 = config 기본값 복원 &nbsp;|&nbsp; PBGR &lt; 1 = 저평가
</div>

<script>
const LS_KEY = 'pbgr_settings_v2';

// ─── localStorage 저장 ────────────────────────────────────
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}
function saveSettings() {
  const s = { req_kr: parseFloat(document.getElementById('req-kr').value) || 10, roe: {} };
  document.querySelectorAll('.roe-input').forEach(inp => {
    const val = parseFloat(inp.value);
    const def = parseFloat(inp.dataset.default);
    if (!isNaN(val) && Math.abs(val - def) > 0.001) s.roe[inp.dataset.ticker] = val;
  });
  localStorage.setItem(LS_KEY, JSON.stringify(s));
  setStatus('✓ 저장됨', '#4ade80');
  const btn = document.getElementById('save-btn');
  btn.className = 'save-btn saved';
  btn.textContent = '✓ 저장됨';
  renderTable();
}

// ─── 상태 표시 ────────────────────────────────────────────
function setStatus(msg, color='#475569') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = color;
}
function markDirty() {
  const btn = document.getElementById('save-btn');
  btn.className = 'save-btn unsaved';
  btn.textContent = '● 저장';
  setStatus('수정됨', '#fbbf24');
  renderTable();
}

let configData = null;

async function loadConfig() {
  const res = await fetch('config.json');
  configData = await res.json();
  return configData;
}

// ─── 포맷 ─────────────────────────────────────────────────
function fmtKR(v) { return v != null ? Number(v).toLocaleString('ko-KR') + '원' : '—'; }
function gap(pbgr) {
  if (!pbgr) return '—';
  const pct = ((1 / pbgr) - 1) * 100;
  const sign = pct >= 0 ? '+' : '';
  return `<span style="color:${pct >= 0 ? '#4ade80' : '#f87171'}">${sign}${pct.toFixed(1)}%</span>`;
}
function pbgrHtml(pbgr) {
  if (!pbgr) return '—';
  const cls = pbgr < 1 ? 'under' : 'over';
  const badge = pbgr < 1
    ? '<span class="badge badge-under">저평가</span>'
    : '<span class="badge badge-over">고평가</span>';
  return `<span class="pbgr-val ${cls}">${pbgr.toFixed(3)}${badge}</span>`;
}

// ─── 재계산 ───────────────────────────────────────────────
function recalcKR(price, equity_100m, roe_pct, shares, base_date, req_pct) {
  if (!price || !equity_100m || !roe_pct || !shares) return null;
  const base = new Date(base_date);
  const today = new Date();
  const months = (today.getFullYear() - base.getFullYear()) * 12 + (today.getMonth() - base.getMonth());
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const dv = months + (today.getDate() - 1) / daysInMonth;
  const roe = roe_pct / 100, r = req_pct / 100;
  const y10 = equity_100m * Math.pow(1 + roe, 10);
  const y11 = equity_100m * Math.pow(1 + roe, 11);
  const r_t = Math.pow(y11 / y10, 1 / 12) - 1;
  const trailing = y10 * Math.pow(1 + r_t, dv - 1);
  const bps = trailing / Math.pow(1 + r, 10) * 1e8 / shares;
  return bps > 0 ? { pbgr: price / bps, fair_price: Math.round(bps) } : null;
}

// ─── 렌더 ─────────────────────────────────────────────────
let rawData = null;

function renderTable() {
  const reqKR = parseFloat(document.getElementById('req-kr').value) || 10;
  const tbody = document.getElementById('kr-body');

  // 현재 ROE 인풋 값 수집 (렌더 전)
  const currentRoe = {};
  document.querySelectorAll('.roe-input').forEach(inp => {
    currentRoe[inp.dataset.ticker] = parseFloat(inp.value);
  });

  tbody.innerHTML = '';

  const assets = rawData.assets.filter(a => a.market === 'KR');
  const s = loadSettings();
  const withCalc = assets.map(a => {
    const configRoe = configData?.kr?.assets?.[a.ticker]?.roe ?? a.roe_pct;
    const roe = currentRoe[a.ticker] ?? s.roe?.[a.ticker] ?? configRoe;
    const isCustom = Math.abs(roe - a.roe_pct) > 0.001;
    const calc = recalcKR(a.price, a.equity_y0_100m, roe, a.shares, a.base_date, reqKR);
    return { ...a, _roe: roe, _isCustom: isCustom, _calc: calc };
  });
  // config 순서 유지 (정렬 없음)

  withCalc.forEach(a => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="name">${a.name}</div><div class="ticker">${a.ticker}</div></td>
      <td>${fmtKR(a.price)}</td>
      <td>${a._calc ? fmtKR(a._calc.fair_price) : '—'}</td>
      <td>${gap(a._calc?.pbgr)}</td>
      <td>${pbgrHtml(a._calc?.pbgr)}</td>
      <td>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px">
          <span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;
            background:${a._isCustom ? '#60a5fa' : '#334155'}"
            title="${a._isCustom ? '수정됨' : (a.roe_note||'config 기본값')}"></span>
          <input class="edit-input roe-input${a._isCustom ? ' dirty' : ''}"
            type="number" step="0.01"
            value="${a._roe.toFixed(2)}"
            data-ticker="${a.ticker}"
            data-default="${a.roe_pct}"
            oninput="markDirty()"
            ondblclick="resetRoe(this)">
          <span class="unit">%</span>
        </div>
      </td>
      <td style="color:#475569;font-size:0.75rem">${a.base_date || '—'}</td>
    `;
    // 3년 실측 ROE 컬럼
    const roeTd = document.createElement('td');
    roeTd.style.cssText = 'text-align:right;white-space:nowrap';
    if (a.roe_history?.history?.length) {
      const hist = a.roe_history.history;
      const avg = a.roe_history.avg_pct;
      const rows = hist.map(h =>
        `<span style="color:#334155">${h.year}</span><span style="color:#475569;margin-left:3px">${h.roe_pct > 0 ? '+' : ''}${h.roe_pct.toFixed(1)}%</span>`
      ).join(' <span style="color:#1e2535">|</span> ');
      roeTd.innerHTML = `<div style="font-size:0.72rem">${rows}</div>
        <div style="font-size:0.7rem;color:#475569;margin-top:2px">평균 ${avg.toFixed(1)}%</div>`;
    } else {
      roeTd.textContent = '—';
    }
    tr.appendChild(roeTd);
    tbody.appendChild(tr);
  });
}

function resetRoe(inp) {
  const defaultVal = configData?.kr?.assets?.[inp.dataset.ticker]?.roe ?? parseFloat(inp.dataset.default);
  inp.value = defaultVal.toFixed(2);
  markDirty();
}

// ─── 초기화 ───────────────────────────────────────────────
async function init() {
  const [dataRes, cfg] = await Promise.all([
    fetch('pbgr_data.json').then(r => r.json()),
    loadConfig()
  ]);

  rawData = dataRes;
  document.getElementById('updated').textContent = rawData.updated;
  const s = loadSettings();
  document.getElementById('req-kr').value = s.req_kr ?? (cfg.kr.required_return * 100).toFixed(1);

  document.getElementById('req-kr').addEventListener('input', markDirty);
  renderTable();
}

init();
</script>
</body>
</html>
