<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBGR 가치평가 모니터</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    header{padding:20px 28px 14px;border-bottom:1px solid #1e2535;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .header-left h1{font-size:1.2rem;font-weight:700;color:#f8fafc}
    .header-left p{font-size:0.74rem;color:#475569;margin-top:4px}
    .header-right{display:flex;align-items:center;gap:8px}

    .save-btn{
      font-size:0.75rem;font-weight:600;padding:7px 16px;border-radius:8px;
      border:1px solid #1e3a5f;background:#1e293b;color:#60a5fa;cursor:pointer;
      transition:all .15s;white-space:nowrap;
    }
    .save-btn:hover{background:#1e3a5f;color:#93c5fd}
    .save-btn.saved{border-color:#166534;background:#14532d;color:#4ade80}
    .save-btn.unsaved{border-color:#92400e;background:#451a03;color:#fbbf24}

    .section{padding:24px 28px 0}
    .section:last-of-type{padding-bottom:32px}

    .section-title{
      font-size:0.75rem;font-weight:700;color:#64748b;
      letter-spacing:.08em;text-transform:uppercase;
      margin-bottom:12px;display:flex;align-items:center;gap:10px;
    }
    .param{
      font-size:0.78rem;color:#94a3b8;font-weight:500;
      text-transform:none;letter-spacing:0;
      background:#161b27;border:1px solid #1e2535;border-radius:6px;
      padding:4px 12px;display:flex;align-items:center;gap:6px;
    }

    table{width:100%;border-collapse:collapse;font-size:0.84rem}
    thead tr{border-bottom:1px solid #1e2535}
    th{padding:8px 14px;text-align:right;font-size:0.68rem;font-weight:600;color:#475569;letter-spacing:.04em;white-space:nowrap}
    th:first-child{text-align:left}
    tbody tr{border-bottom:1px solid #161b27;transition:background .12s}
    tbody tr:hover{background:#141820}
    td{padding:12px 14px;text-align:right;color:#cbd5e1;white-space:nowrap}
    td:first-child{text-align:left}

    .name{font-weight:700;color:#f1f5f9;font-size:0.88rem}
    .ticker{font-size:0.68rem;color:#475569;margin-top:2px}

    .pbgr-val{font-weight:800;font-size:1.05rem}
    .under{color:#4ade80}
    .over {color:#f87171}

    /* ROE 입력 */
    .roe-cell{display:flex;align-items:center;justify-content:flex-end;gap:6px}
    .roe-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;cursor:help}
    .roe-input{
      -moz-appearance:textfield;
      background:#1a2030;border:1px solid #2d3748;border-radius:6px;
      color:#e2e8f0;font-size:0.92rem;font-family:inherit;
      width:64px;text-align:right;outline:none;padding:5px 8px;
      transition:border-color .15s, color .15s;
    }
    .roe-input::-webkit-inner-spin-button,
    .roe-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    .roe-input:focus{border-color:#60a5fa;color:#f1f5f9}
    .roe-input.dirty{border-color:#92400e;color:#fbbf24}
    .unit{color:#475569;font-size:0.78rem}

    /* 요구수익률 입력 */
    .req-input{
      -moz-appearance:textfield;
      background:#1a2030;border:1px solid #2d3748;border-radius:6px;
      color:#e2e8f0;font-size:0.84rem;font-family:inherit;
      width:52px;text-align:right;outline:none;padding:4px 8px;
      transition:border-color .15s;
    }
    .req-input::-webkit-inner-spin-button,
    .req-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    .req-input:focus{border-color:#60a5fa}

    .status-msg{font-size:0.7rem;color:#475569}
    .note{font-size:0.68rem;color:#334155;padding:12px 28px 24px}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 PBGR 가치평가 모니터</h1>
    <p>Price to Book Growth Ratio · 한국 주식 · <span id="updated"></span> 기준</p>
  </div>
  <div class="header-right">
    <span class="status-msg" id="status-msg"></span>
    <button class="save-btn saved" id="save-btn" onclick="saveSettings()">✓ 저장됨</button>
  </div>
</header>

<div class="section">
  <div class="section-title">
    🇰🇷 한국
    <span class="param">
      요구수익률
      <input class="req-input" id="req-kr" type="number" step="0.1" value="10" oninput="markDirty()">
      <span style="color:#64748b;font-size:0.78rem">%</span>
    </span>
  </div>
  <table>
    <thead><tr>
      <th>종목</th>
      <th>전일 종가</th>
      <th>적정가</th>
      <th>괴리율</th>
      <th>현재 자본 (추정)</th>
      <th>PBGR</th>
      <th>ROE ✎</th>
      <th style="color:#334155;font-weight:500">ROE 참고</th>
      <th style="color:#334155;font-weight:500">주식수</th>
    </tr></thead>
    <tbody id="kr-body"></tbody>
  </table>
</div>

<div class="note">
  ROE · 요구수익률 수정 후 <strong style="color:#60a5fa">저장</strong> 클릭 → 브라우저에 영구 저장 &nbsp;|&nbsp;
  ROE 더블클릭 = 기본값 복원 &nbsp;|&nbsp; PBGR &lt; 1 = 저평가
</div>

<script>
const LS_KEY = 'pbgr_settings_v2';

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}
function saveSettings() {
  const s = { req_kr: parseFloat(document.getElementById('req-kr').value) || 10, roe: {} };
  document.querySelectorAll('.roe-input').forEach(inp => {
    const val = parseFloat(inp.value);
    const def = parseFloat(inp.dataset.default);
    if (!isNaN(val) && Math.abs(val - def) > 0.001) s.roe[inp.dataset.ticker] = val;
  });
  localStorage.setItem(LS_KEY, JSON.stringify(s));
  setStatus('✓ 저장됨', '#4ade80');
  const btn = document.getElementById('save-btn');
  btn.className = 'save-btn saved';
  btn.textContent = '✓ 저장됨';
  renderTable();
}

function setStatus(msg, color='#475569') {
  const el = document.getElementById('status-msg');
  el.textContent = msg; el.style.color = color;
}
function markDirty() {
  document.getElementById('save-btn').className = 'save-btn unsaved';
  document.getElementById('save-btn').textContent = '● 저장';
  setStatus('수정됨', '#fbbf24');
  // ROE는 포커스 잃을 때 재계산 (입력 중 방해 안 함)
  if (document.activeElement && document.activeElement.classList.contains('roe-input')) return;
  renderTable();
}

let configData = null;
async function loadConfig() {
  configData = await fetch('config.json').then(r => r.json());
  return configData;
}

function fmtKR(v) { return v != null ? Number(v).toLocaleString('ko-KR') + '원' : '—'; }
function gap(pbgr) {
  if (!pbgr) return '—';
  const pct = ((1 / pbgr) - 1) * 100;
  return `<span style="color:${pct >= 0 ? '#4ade80' : '#f87171'}">${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%</span>`;
}
function pbgrHtml(pbgr) {
  if (!pbgr) return '—';
  const cls = pbgr < 1 ? 'under' : 'over';
  return `<span class="pbgr-val ${cls}">${pbgr.toFixed(3)}</span>`;
}

function recalcKR(price, equity_100m, roe_pct, shares, base_date, req_pct) {
  if (!price || !equity_100m || !roe_pct || !shares) return null;
  const base = new Date(base_date);
  const today = new Date();
  const months = (today.getFullYear() - base.getFullYear()) * 12 + (today.getMonth() - base.getMonth());
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const dv = months + (today.getDate() - 1) / daysInMonth;
  const roe = roe_pct / 100, r = req_pct / 100;
  const y10 = equity_100m * Math.pow(1 + roe, 10);
  const y11 = equity_100m * Math.pow(1 + roe, 11);
  const r_t = Math.pow(y11 / y10, 1 / 12) - 1;
  const trailing = y10 * Math.pow(1 + r_t, dv - 1);
  const bps = trailing / Math.pow(1 + r, 10) * 1e8 / shares;
  return bps > 0 ? { pbgr: price / bps, fair_price: Math.round(bps) } : null;
}

let rawData = null;

function renderTable() {
  const reqKR = parseFloat(document.getElementById('req-kr').value) || 10;
  const tbody = document.getElementById('kr-body');
  const s = loadSettings();

  const currentRoe = {};
  document.querySelectorAll('.roe-input').forEach(inp => {
    currentRoe[inp.dataset.ticker] = parseFloat(inp.value);
  });

  tbody.innerHTML = '';
  const assets = rawData.assets.filter(a => a.market === 'KR');

  assets.forEach(a => {
    const configRoe = configData?.kr?.assets?.[a.ticker]?.roe ?? a.roe_pct;
    const roe = currentRoe[a.ticker] ?? s.roe?.[a.ticker] ?? configRoe;
    const isCustom = Math.abs(roe - configRoe) > 0.001;
    const calc = recalcKR(a.price, a.equity_y0_100m, roe, a.shares, a.base_date, reqKR);

    const tr = document.createElement('tr');

    // 기본 컬럼들
    // 현재 자본 추정: ROE 변경 시 재계산, 기본은 서버값
    let equityNow = null;
    const roeDiff = Math.abs(a._roe - a.roe_pct) > 0.001;
    if (roeDiff && a.equity_y0_100m && a._roe && a.base_date) {
      // ROE 수정된 경우 클라이언트 재계산
      const parts = a.base_date.split('.');
      const bY = parseInt(parts[0]), bM = parseInt(parts[1]);
      const base = new Date(bY, bM - 1, new Date(bY, bM, 0).getDate());
      const t = new Date();
      const m2 = (t.getFullYear()-bY)*12+(t.getMonth()-(bM-1));
      const dv2 = m2 + (t.getDate()-1)/new Date(t.getFullYear(), t.getMonth()+1, 0).getDate();
      equityNow = a.equity_y0_100m * Math.pow(1 + a._roe/100, dv2/12);
    } else {
      // 서버 계산값 사용
      equityNow = a.equity_now_100m;
    }

    tr.innerHTML = `
      <td><div class="name">${a.name}</div><div class="ticker">${a.ticker}</div></td>
      <td>${fmtKR(a.price)}</td>
      <td>${calc ? fmtKR(calc.fair_price) : '—'}</td>
      <td>${gap(calc?.pbgr)}</td>
      <td style="color:#64748b;font-size:0.8rem">${equityNow ? (equityNow >= 10000 ? (equityNow/10000).toFixed(1) + '조' : Math.round(equityNow).toLocaleString('ko-KR') + '억') : '—'}</td>
      <td>${pbgrHtml(calc?.pbgr)}</td>
    `;

    // ROE 입력 컬럼
    const roeTd = document.createElement('td');
    const roeCell = document.createElement('div');
    roeCell.className = 'roe-cell';

    const dot = document.createElement('span');
    dot.className = 'roe-dot';
    dot.style.background = isCustom ? '#60a5fa' : '#2d3748';
    dot.title = isCustom ? '수정됨 (더블클릭 복원)' : (a.roe_note || '기본값');

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.inputMode = 'decimal';
    inp.className = 'roe-input' + (isCustom ? ' dirty' : '');
    inp.value = roe.toFixed(2);
    inp.dataset.ticker = a.ticker;
    inp.dataset.default = configRoe;
    inp.addEventListener('change', markDirty);
    inp.addEventListener('input', () => {
      // 입력 중 재렌더 없이 상태 표시만
      document.getElementById('save-btn').className = 'save-btn unsaved';
      document.getElementById('save-btn').textContent = '● 저장';
      setStatus('수정됨', '#fbbf24');
    });
    inp.addEventListener('blur', renderTable);
    inp.addEventListener('dblclick', () => {
      inp.value = configRoe.toFixed(2);
      markDirty();
    });

    const unit = document.createElement('span');
    unit.className = 'unit';
    unit.textContent = '%';

    roeCell.append(dot, inp, unit);
    roeTd.appendChild(roeCell);
    tr.appendChild(roeTd);

    // ROE 참고 컬럼
    const histTd = document.createElement('td');
    histTd.style.cssText = 'text-align:right;white-space:nowrap';
    const ref = a.roe_ref;
    if (ref) {
      let html = '';
      if (ref.actual_avg != null)
        html += `<div style="font-size:0.78rem;color:#64748b">실적 평균 <span style="color:#94a3b8;font-weight:600">${ref.actual_avg.toFixed(1)}%</span></div>`;
      if (ref.estimate_avg != null)
        html += `<div style="font-size:0.78rem;color:#334155;margin-top:2px">추정 평균 <span style="color:#475569;font-weight:600">${ref.estimate_avg.toFixed(1)}%</span></div>`;
      histTd.innerHTML = html || '—';
    } else {
      histTd.textContent = '—';
    }
    tr.appendChild(histTd);

    // 주식수 컬럼
    const sharesTd = document.createElement('td');
    sharesTd.style.cssText = 'text-align:right;white-space:nowrap';
    const fmtShares = v => v ? (v / 1e8).toFixed(2) + '억주' : '—';
    if (a.shares || a.shares_common) {
      const total = a.shares || a.shares_common;
      const common = a.shares_common;
      const preferred = a.shares_preferred;
      let html = `<div style="font-size:0.78rem;color:#94a3b8">전체 ${fmtShares(total)}</div>`;
      html += `<div style="font-size:0.72rem;color:#475569;margin-top:1px">보통주 ${fmtShares(common)}`;
      if (preferred) html += ` / 우선주 ${fmtShares(preferred)}`;
      html += '</div>';
      sharesTd.innerHTML = html;
    } else {
      sharesTd.textContent = '—';
    }
    tr.appendChild(sharesTd);
    tbody.appendChild(tr);
  });
}

async function init() {
  const [dataRes] = await Promise.all([
    fetch('pbgr_data.json').then(r => r.json()),
    loadConfig()
  ]);
  rawData = dataRes;
  document.getElementById('updated').textContent = rawData.updated;
  const s = loadSettings();
  document.getElementById('req-kr').value = s.req_kr ?? (configData.kr.required_return * 100).toFixed(1);
  document.getElementById('req-kr').addEventListener('input', markDirty);
  renderTable();
}

init();
</script>
</body>
</html>
