<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBGR 가치평가 모니터</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    header{padding:20px 28px 14px;border-bottom:1px solid #1e2535}
    header h1{font-size:1.2rem;font-weight:700;color:#f8fafc}
    header p{font-size:0.74rem;color:#475569;margin-top:4px}

    .section{padding:24px 28px}
    .section + .section{padding-top:0}

    .section-title{
      font-size:0.78rem;font-weight:700;color:#64748b;
      letter-spacing:.08em;text-transform:uppercase;
      margin-bottom:12px;display:flex;align-items:center;gap:8px;
    }
    .section-title span{color:#334155;font-size:0.72rem;font-weight:500;text-transform:none;letter-spacing:0}

    table{width:100%;border-collapse:collapse;font-size:0.85rem}
    thead tr{border-bottom:1px solid #1e2535}
    th{
      padding:8px 12px;text-align:right;font-size:0.7rem;font-weight:600;
      color:#475569;letter-spacing:.04em;white-space:nowrap;
    }
    th:first-child{text-align:left}
    tbody tr{border-bottom:1px solid #161b27;transition:background .15s}
    tbody tr:hover{background:#161b27}
    td{padding:10px 12px;text-align:right;color:#cbd5e1;white-space:nowrap}
    td:first-child{text-align:left}

    /* 종목명 */
    .name{font-weight:700;color:#f1f5f9}
    .ticker{font-size:0.7rem;color:#475569;margin-top:2px}

    /* PBGR 값 색상 */
    .pbgr-val{font-weight:800;font-size:1.0rem}
    .under{color:#4ade80}   /* < 1 저평가 */
    .over {color:#f87171}   /* > 1 고평가 */

    /* 배지 */
    .badge{
      display:inline-block;font-size:0.62rem;font-weight:700;
      padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle;
    }
    .badge-under{background:rgba(34,197,94,.15);color:#4ade80}
    .badge-over {background:rgba(239,68,68,.15);color:#f87171}

    /* 현재가 vs 적정가 바 */
    .bar-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
    .bar-bg{
      width:80px;height:6px;background:#1e2535;border-radius:3px;overflow:hidden;flex-shrink:0;
    }
    .bar-fill{height:100%;border-radius:3px;transition:width .3s}

    .note{font-size:0.68rem;color:#334155;padding:0 28px 24px}
  </style>
</head>
<body>

<header>
  <h1>📊 PBGR 가치평가 모니터</h1>
  <p>Price to Book Growth Ratio · <span id="updated"></span></p>
</header>

<div class="section" id="kr-section">
  <div class="section-title">
    🇰🇷 한국
    <span id="kr-params"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>종목</th>
        <th>현재가</th>
        <th>적정가 (BPS)</th>
        <th>괴리율</th>
        <th>PBGR</th>
        <th>ROE</th>
        <th>PER</th>
        <th>PBR</th>
        <th>기준일</th>
      </tr>
    </thead>
    <tbody id="kr-body"></tbody>
  </table>
</div>

<div class="section" id="us-section">
  <div class="section-title">
    🇺🇸 미국
    <span id="us-params"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>종목</th>
        <th>현재가</th>
        <th>적정가</th>
        <th>괴리율</th>
        <th>PBGR</th>
        <th>ROE</th>
        <th>보정</th>
      </tr>
    </thead>
    <tbody id="us-body"></tbody>
  </table>
</div>

<div class="note">
  PBGR = 현재가 / 적정가 (ROE 기반 10년 성장 모델 → 현재가치 환산) &nbsp;|&nbsp;
  저평가(PBGR &lt; 1): 현재가 &lt; 적정가 &nbsp;|&nbsp; 데이터: 네이버 파이낸스 · yfinance
</div>

<script>
function fmt(v, opts={}) {
  if (v === null || v === undefined) return '—';
  return v.toLocaleString('ko-KR', opts);
}
function fmtKR(v) {
  if (!v && v !== 0) return '—';
  return Number(v).toLocaleString('ko-KR') + '원';
}
function fmtUS(v, digits=2) {
  if (!v && v !== 0) return '—';
  return '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits:digits, maximumFractionDigits:digits});
}
function fmtPct(v) {
  if (!v && v !== 0) return '—';
  return Number(v).toFixed(2) + '%';
}

function pbgrClass(pbgr) {
  if (pbgr === null || pbgr === undefined) return '';
  return pbgr < 1 ? 'under' : 'over';
}
function badgeHtml(pbgr) {
  if (pbgr === null || pbgr === undefined) return '';
  const cls = pbgr < 1 ? 'badge-under' : 'badge-over';
  const txt = pbgr < 1 ? '저평가' : '고평가';
  return `<span class="badge ${cls}">${txt}</span>`;
}

// 현재가/적정가 비율 바 (현재가가 적정가의 몇 %)
function barHtml(pbgr) {
  if (!pbgr) return '';
  // 바는 1 기준: 저평가면 채움<100%, 고평가면 100%
  const fillPct = Math.min(100, (1 / pbgr) * 100);
  const color = pbgr < 1 ? '#4ade80' : '#f87171';
  return `<div class="bar-wrap">
    <div class="bar-bg"><div class="bar-fill" style="width:${fillPct}%;background:${color}"></div></div>
  </div>`;
}

function gap(pbgr) {
  if (!pbgr) return '—';
  const pct = ((1 / pbgr) - 1) * 100;
  const sign = pct >= 0 ? '+' : '';
  return `<span style="color:${pct >= 0 ? '#4ade80' : '#f87171'}">${sign}${pct.toFixed(1)}%</span>`;
}

async function init() {
  const res = await fetch('pbgr_data.json');
  const data = await res.json();

  document.getElementById('updated').textContent = data.updated + ' 기준';
  document.getElementById('kr-params').textContent =
    `· 요구수익률 ${(data.kr_required_return*100).toFixed(0)}%, 기준일 2024-01-01`;
  document.getElementById('us-params').textContent =
    `· 요구수익률 ${(data.us_required_return*100).toFixed(0)}%, 기준일 2021-01-01`;

  const kr = data.assets.filter(a => a.market === 'KR');
  const us = data.assets.filter(a => a.market === 'US');

  // 한국 테이블
  const krBody = document.getElementById('kr-body');
  kr.sort((a,b) => (a.pbgr||999) - (b.pbgr||999));
  kr.forEach(a => {
    const cls = pbgrClass(a.pbgr);
    krBody.innerHTML += `<tr>
      <td>
        <div class="name">${a.name}</div>
        <div class="ticker">${a.ticker}</div>
      </td>
      <td>${fmtKR(a.price)}</td>
      <td>${fmtKR(a.fair_price)}</td>
      <td>${gap(a.pbgr)}</td>
      <td class="pbgr-val ${cls}">${a.pbgr ? a.pbgr.toFixed(3) : '—'}${badgeHtml(a.pbgr)}</td>
      <td>${fmtPct(a.roe_pct)}</td>
      <td>${a.per ? a.per.toFixed(1) + 'x' : '—'}</td>
      <td>${a.pbr ? a.pbr.toFixed(2) + 'x' : '—'}</td>
      <td style="color:#475569;font-size:0.75rem">${a.base_date || '—'}</td>
    </tr>`;
  });

  // 미국 테이블
  const usBody = document.getElementById('us-body');
  us.sort((a,b) => (a.pbgr||999) - (b.pbgr||999));
  us.forEach(a => {
    const cls = pbgrClass(a.pbgr);
    usBody.innerHTML += `<tr>
      <td>
        <div class="name">${a.name}</div>
        <div class="ticker">${a.ticker}</div>
      </td>
      <td>${fmtUS(a.price)}</td>
      <td>${fmtUS(a.fair_price)}</td>
      <td>${gap(a.pbgr)}</td>
      <td class="pbgr-val ${cls}">${a.pbgr ? a.pbgr.toFixed(3) : '—'}${badgeHtml(a.pbgr)}</td>
      <td>${fmtPct(a.roe_pct)}</td>
      <td>${a.correction !== undefined ? a.correction : '—'}</td>
    </tr>`;
  });
}

init();
</script>
</body>
</html>
